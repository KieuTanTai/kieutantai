name: Contributors with contributions count
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics-overview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
        - uses: lowlighter/metrics@latest
          with:
            filename: metrics.plugin.contributors.categories.svg
            base: ""
            token: ${{ secrets.PROFILE_KEY }}
            optimize: svg
            experimental_features: --optimize-svg
            config_timezone: Asia/Bangkok
            output_action: commit
            committer_branch: main
            committer_message: "chore: update metrics overview"
            template: repository
            repo: metrics
            plugin_contributors: yes
            plugin_contributors_sections: categories
            plugin_contributors_categories: |
              {
                "🧩 Plugins / 🖼️ templates":["source/plugins/**", "source/templates/**"],
                "📚 Documentation":["README.md", "**/README.md", "**/metadata.yml"],
                "💻 Code (other)":["source/**", "Dockerfile"]
              }
          
        
